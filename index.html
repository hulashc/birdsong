<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Spatiotemporal Acoustic Manifold</title>
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: #050508;
      color: #fff;
      font-family: 'Helvetica Neue', sans-serif;
      overflow: hidden;
    }

    canvas {
      display: block;
    }

    /* Overlay */
    #overlay {
      position: fixed;
      inset: 0;
      z-index: 20;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #050508;
      cursor: pointer;
      transition: opacity 0.8s ease;
    }

    #overlay.hidden {
      opacity: 0;
      pointer-events: none;
    }

    #overlay h1 {
      font-size: clamp(14px, 2vw, 20px);
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: #fff;
      font-weight: 300;
      margin-bottom: 6px;
    }

    #overlay p {
      font-size: clamp(10px, 1.2vw, 13px);
      letter-spacing: 0.2em;
      color: #555;
      text-transform: uppercase;
      margin-bottom: 48px;
    }

    #overlay .start-ring {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      border: 1px solid rgba(255, 255, 255, 0.25);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: border-color 0.3s;
    }

    #overlay:hover .start-ring {
      border-color: rgba(255, 255, 255, 0.7);
    }

    #overlay .start-ring svg {
      width: 22px;
      height: 22px;
      fill: #fff;
      opacity: 0.8;
    }

    /* Bottom UI */
    #ui {
      position: fixed;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      display: flex;
      align-items: center;
      gap: 20px;
      pointer-events: none;
    }

    #label {
      font-size: 10px;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.4);
    }

    #playBtn {
      pointer-events: all;
      background: none;
      border: 1px solid rgba(255, 255, 255, 0.2);
      color: rgba(255, 255, 255, 0.6);
      border-radius: 20px;
      padding: 6px 20px;
      font-size: 10px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
      display: none;
    }

    #playBtn:hover {
      border-color: rgba(255, 255, 255, 0.6);
      color: #fff;
    }

    /* Legend */
    #legend {
      position: fixed;
      top: 28px;
      right: 28px;
      z-index: 10;
      font-size: 10px;
      line-height: 2.2;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.3);
      pointer-events: none;
    }

    #legend .head {
      color: rgba(255, 255, 255, 0.15);
      margin-bottom: 2px;
    }

    .swatch {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      margin-right: 8px;
      vertical-align: middle;
    }

    /* Top left title */
    #title {
      position: fixed;
      top: 28px;
      left: 28px;
      z-index: 10;
      pointer-events: none;
    }

    #title h2 {
      font-size: 11px;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      font-weight: 300;
      color: rgba(255, 255, 255, 0.5);
    }

    #title p {
      font-size: 10px;
      letter-spacing: 0.2em;
      color: rgba(255, 255, 255, 0.2);
      margin-top: 4px;
    }

    /* Error state */
    #error-state {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 30;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #050508;
      gap: 16px;
    }

    #error-state .error-icon {
      font-size: 32px;
      opacity: 0.5;
    }

    #error-state .error-msg {
      font-size: clamp(12px, 1.5vw, 14px);
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: rgba(255, 100, 80, 0.8);
      max-width: 480px;
      text-align: center;
      line-height: 1.8;
    }

    #error-state .error-hint {
      font-size: 11px;
      letter-spacing: 0.1em;
      color: rgba(255, 255, 255, 0.2);
      text-transform: uppercase;
    }
  </style>
</head>

<body>
  <!-- Error state -->
  <div id="error-state" role="alert">
    <div class="error-icon">⚠</div>
    <div class="error-msg"></div>
    <div class="error-hint">Check the console for details</div>
  </div>

  <!-- Overlay -->
  <div id="overlay">
    <h1>Spatiotemporal Acoustic Manifold</h1>
    <p>A mathematical model of birdsong</p>
    <div class="start-ring">
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <polygon points="5,3 19,12 5,21" />
      </svg>
    </div>
  </div>

  <!-- Top-left title -->
  <div id="title">
    <h2 id="titleSpecies">—</h2>
    <p>MFCC · PCA · 3D Trajectory</p>
  </div>

  <!-- Bottom UI -->
  <div id="ui">
    <div id="label">Spatiotemporal Acoustic Manifold</div>
    <button id="playBtn">Pause</button>
  </div>

  <!-- Legend -->
  <div id="legend" aria-label="Colour and size legend">
    <div class="head">Colour · Energy</div>
    <div><span class="swatch" style="background:#3a6fff"></span>Silence</div>
    <div><span class="swatch" style="background:#00e5aa"></span>Mid</div>
    <div><span class="swatch" style="background:#ff6a00"></span>Peak call</div>
    <div style="margin-top:10px" class="head">Size · Amplitude</div>
    <div>Larger = louder</div>
    <div style="margin-top:10px" class="head">Axes</div>
    <div><span style="color:#ff4444">━</span> PC1 Timbre</div>
    <div><span style="color:#44ff88">━</span> PC2 Texture</div>
    <div><span style="color:#4488ff">━</span> PC3 Spectral</div>
  </div>

  <script type="importmap">
    { "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }}
  </script>

  <script type="module" src="./src/main.js"></script>
</body>

</html>
